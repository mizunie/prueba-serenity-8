# serenity.conf
serenity {
  # Directorio donde se guardan los reportes
  output.dir = target/site/serenity
  
  # Tomar screenshots solo cuando fallen
  take.screenshots = FOR_FAILURES
  
  # Usar un browser único por test
  use.unique.browser = true
  
  # No reiniciar browser entre escenarios (más rápido)
  restart.browser.each.scenario = false
}

webdriver {
  # Driver por defecto: chrome, firefox, edge
  driver = chrome
  
  # Timeouts
  timeouts {
    implicitlywait = 5000
    pageload = 30000
    script = 10000
  }
}

# Configuración de Chrome
chrome {
  # Opciones para headless (opcional)
  # arguments = "--headless --disable-gpu"
}

serenity {
  take.screenshots = FOR_FAILURES
  use.unique.browser = true
  restart.browser.each.scenario = false
}

# Reportes
reports {
  # Mostrar reportes en consola
  show = true
}